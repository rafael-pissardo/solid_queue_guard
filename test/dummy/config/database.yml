default: &default
  adapter: sqlite3
  pool: 10
  timeout: 5000

test:
  primary:
    <<: *default
    database: db/test.sqlite3
  queue:
    <<: *default
    database: db/test_queue.sqlite3
    migrations_paths: db/queue_migrate

development:
  primary:
    <<: *default
    database: db/development.sqlite3
  queue:
    <<: *default
    database: db/development_queue.sqlite3
    migrations_paths: db/queue_migrate
